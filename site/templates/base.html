<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>{% block title %}{{ config.title }}{% endblock %}</title>
        <meta name="description" content="{{ config.description }}" />
        <link rel="stylesheet" href="{{ get_url(path='style.css') }}" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
            rel="stylesheet"
        />
        <script
            type="module"
            src="{{ get_url(path='rf-components.js') }}"
        ></script>
    </head>
    <body>
        <nav>
            <div class="nav-inner">
                <a href="{{ get_url(path='/') }}" class="logo"
                    ><svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="8 4 48 44" fill="none" aria-hidden="true"><path d="M22 8H42L52 26L42 44H22L12 26L22 8Z" stroke="currentColor" stroke-width="4" stroke-linejoin="round"/><path d="M33 12L27 27H32L29 40L38 25H33L35.5 12Z" fill="currentColor"/></svg> rune-reactor</
                >
                <div class="nav-links">
                    <a href="{{ get_url(path='playground') }}">Playground</a>
                    <a href="{{ get_url(path='decoder') }}">Decoder</a>
                    <a href="{{ get_url(path='builder') }}">Builder</a>
                    <a href="{{ get_url(path='docs') }}">Docs</a>
                    <a
                        href="https://github.com/nepet/runereactor"
                        class="nav-github"
                        aria-label="GitHub repository"
                    >
                        <svg
                            width="20"
                            height="20"
                            viewBox="0 0 16 16"
                            fill="currentColor"
                        >
                            <path
                                d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"
                            />
                        </svg>
                    </a>
                </div>
            </div>
        </nav>
        <main>{% block content %}{% endblock %}</main>
        <footer>
            <p>rune-reactor v{{ config.extra.version }}</p>
            <p class="footer-links">
                <a href="https://github.com/rustyrussell/runes"
                    >Original Runes Implementation</a
                >
                <span class="sep">&middot;</span>
                <a href="https://github.com/nepet/futhark">futhark</a>
                <span class="sep">&middot;</span>
                <a href="https://github.com/nepet/runereactor">Source</a>
            </p>
        </footer>
    </body>
</html>
